  <!-- Kritik CSS inline, geri kalanı async -->
  <style>
    :root{--bg-color:#f8f9fa;--text-color:#333;--glass-bg:rgba(255,255,255,0.4);--glass-border:rgba(255,255,255,0.2);--accent-color:#fff;--shadow-color:rgba(0,0,0,0.1)}

    html,body{width:100%;height:100%;font-family:'Montserrat',sans-serif}
    body{transition:background .5s ease,color .5s ease;background:url('Images/background.webp') center/cover no-repeat;display:flex;justify-content:center;align-items:center;position:relative;overflow:hidden}

  </style>

<body class="light-mode">

    </div>
  </div>

  <!-- Contact Modal -->
  <div id="contact-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="contact-title">
    <div class="modal-content form-modal">
      <span class="close-modal" id="close-contact" role="button" aria-label="Kapat" tabindex="0">&times;</span>
      <h2 id="contact-title" data-tr="Bana Mesaj Gönder" data-en="Send Me a Message">Bana Mesaj Gönder</h2>
      <form id="contact-form">
        <input type="text" id="form-name" placeholder="İsminiz / Your Name" required>
        <input type="text" id="form-subject" placeholder="Konu / Subject" required>
        <textarea id="form-message" placeholder="Mesajınız / Your Message" required></textarea>
        <button type="submit" id="send-btn" data-tr="Gönder" data-en="Send">Gönder</button>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => {
            console.log('PWA Kaydı Başarılı!');
            // Yeni SW hazır olduğunda kullanıcıya bildir
            reg.addEventListener('updatefound', () => {
              const newSW = reg.installing;
              newSW.addEventListener('statechange', () => {
                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('Yeni sürüm mevcut. Yenilemek için sayfayı kapatıp açın.');
                }
              });
            });
          })
          .catch(err => console.log('PWA Kaydı Başarısız:', err));
      });
    }
  </script>
